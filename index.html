<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>潜探 - 潜水日历体验版</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #1f2a33;
      }
      .card {
        width: min(92vw, 560px);
        background: #ffffff;
        border-radius: 20px;
        padding: 28px 24px 30px;
        box-shadow: 0 12px 36px rgba(22, 36, 52, 0.1);
        text-align: center;
      }
      .qr {
        width: min(76vw, 320px);
        height: auto;
        border-radius: 10px;
      }
      h1 {
        margin: 22px 0 10px;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1.25;
      }
      p {
        margin: 0;
        font-size: clamp(16px, 2.2vw, 20px);
        color: #526270;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="qr" src="./潜水日历二维码.png" alt="潜探小程序二维码" />
      <h1>潜探 - 潜水日历体验版</h1>
      <p>请使用手机微信扫码查看小程序</p>
    </main>
  </body>
</html>
